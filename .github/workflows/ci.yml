name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12.9" }
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Import + smoke check
        working-directory: backend
        run: |
          python -c "from app.main import app; print('backend imports OK')"
          python -c "from app.services.prediction_engine import dataset_stats; print(dataset_stats())"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install + typecheck + build
        working-directory: frontend
        run: |
          npm ci
          npm run typecheck
          npm run build
