services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: neet
      POSTGRES_PASSWORD: neet
      POSTGRES_DB: neetdb
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  api:
    build: ./backend
    depends_on: [db]
    environment:
      DATABASE_URL: postgresql+psycopg2://neet:neet@db:5432/neetdb
      JWT_SECRET: local_dev_secret_change_me_please_32chars
      FRONTEND_ORIGINS: http://localhost:3000
    ports: ["8000:8000"]

volumes:
  pgdata:
